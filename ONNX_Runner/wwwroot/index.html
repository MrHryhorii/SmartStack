<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <!-- Meta configuration -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Tsubaki Voice Engine</title>

    <!-- App icon -->
    <link rel="icon" type="image/svg+xml" href="tsubaki.svg">

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Decorative background (logo watermark) -->
    <div class="watermark"></div>

    <!-- Root container (controls max width + padding) -->
    <div class="container">

        <!-- Header: title + global actions -->
        <header class="header">
            <h1 class="title">🎙️ Tsubaki Voice Engine</h1>

            <!-- Theme switch button -->
            <button id="themeToggle" class="btn-icon" title="Toggle theme">🌓</button>
        </header>

        <!-- Main layout grid -->
        <main class="layout">

            <!-- Primary panel: text input + playback -->
            <section class="panel panel-main">
                
                <!-- Text input field -->
                <div class="field">
                    <label for="textInput" class="label">Text</label>
                    <textarea id="textInput" spellcheck="false" placeholder="Enter text..."></textarea>
                </div>

                <!-- Main action buttons -->
                <div class="actions">
                    <button id="generateBtn" class="btn-primary">Generate</button>
                    <button id="downloadBtn" class="btn-secondary" disabled>Download</button>
                </div>

                <!-- Streaming toggle -->
                <div class="toggle">
                    <input type="checkbox" id="streamToggle" checked>
                    <label for="streamToggle">Stream</label>
                </div>

                <!-- Audio player preview -->
                <audio id="audioPlayer" class="audio" controls></audio>
            </section>

            <!-- Side panel: parameters and settings -->
            <aside class="panel panel-side">

                <!-- Voice selection -->
                <div class="field">
                    <label for="voiceSelect" class="label">Voice</label>
                    <select id="voiceSelect"></select>
                </div>

                <!-- Output format -->
                <div class="field">
                    <label for="formatSelect" class="label">Format</label>
                    <select id="formatSelect">
                        <option value="mp3">MP3</option>
                        <option value="opus">Opus</option>
                        <option value="wav">WAV</option>
                        <option value="pcm">PCM</option>
                    </select>
                </div>

                <!-- Speed control -->
                <div class="field">
                    <label class="label">Speed</label>
                    <div class="row">
                        <input type="range" id="speedSlider" min="0.25" max="4" step="0.01" value="1">
                        <input type="number" id="speedNum" class="input-num" min="0.25" max="4" step="0.01" value="1">
                    </div>
                </div>

                <!-- Visual divider -->
                <div class="divider"></div>

                <!-- Advanced settings title -->
                <div class="section-title">Advanced</div>

                <!-- DSP effect control -->
                <div class="field">
                    <div class="toggle">
                        <input type="checkbox" id="useEffect">
                        <label for="useEffect">Effect</label>
                    </div>

                    <!-- Effect selection -->
                    <select id="effectSelect" disabled></select>
                    
                    <!-- Effect intensity -->
                    <label class="label mt-3">Intensity</label>
                    <div class="row">
                        <input type="range" id="effectIntSlider" min="0" max="1" step="0.01" value="1" disabled>
                        <input type="number" id="effectIntNum" class="input-num" min="0" max="1" step="0.01" value="1" disabled>
                    </div>
                </div>

                <!-- Expression (noise scale) -->
                <div class="field">
                    <div class="toggle">
                        <input type="checkbox" id="useNoiseScale">
                        <label>Expression</label>
                    </div>
                    <div class="row">
                        <input type="range" id="nsSlider" min="0" max="2" step="0.001" value="0.667" disabled>
                        <input type="number" id="nsNum" class="input-num" min="0" max="2" step="0.001" value="0.667" disabled>
                    </div>
                </div>

                <!-- Rhythm (noise W) -->
                <div class="field">
                    <div class="toggle">
                        <input type="checkbox" id="useNoiseW">
                        <label>Rhythm</label>
                    </div>
                    <div class="row">
                        <input type="range" id="nwSlider" min="0" max="2" step="0.001" value="0.8" disabled>
                        <input type="number" id="nwNum" class="input-num" min="0" max="2" step="0.001" value="0.8" disabled>
                    </div>
                </div>

            </aside>

            <!-- Log panel: system output / debug -->
            <section class="panel panel-log">
                <div id="statusLog" class="log"></div>
            </section>

        </main>

    </div>

    <!-- Main application script -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
