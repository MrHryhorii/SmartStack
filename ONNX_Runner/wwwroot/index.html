<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <!-- Basic meta tags and resource links for the Tsubaki TTS Engine web interface -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title and favicon -->
    <title>Tsubaki TTS Engine</title>
    <!-- Favicon for the application -->
    <link rel="icon" type="image/svg+xml" href="tsubaki.svg">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Theme initialization script to handle light/dark mode toggling -->
    <script src="js/theme-init.js"></script>
</head>
<body>
    <!-- Decorative watermark element for visual branding -->
    <div class="watermark"></div>
    <!-- Main container for the application content -->
    <div class="container">
        <!-- Header section with title and theme toggle button -->
        <header class="header">
            <h1 class="title">🎙️ Tsubaki TTS Engine</h1>
            <button id="themeToggle" class="btn-icon" title="Toggle theme">🌓</button>
        </header>
        <!-- Main layout containing the text input, controls, and log panel -->
        <main class="layout">
            <!-- Panel for text input and audio playback controls -->
            <section class="panel panel-main">
                <!-- Textarea for user input to synthesize speech from -->
                <div class="field">
                    <label for="textInput" class="label">Text</label>
                    <textarea id="textInput" spellcheck="false" placeholder="Enter text to synthesize..."></textarea>
                </div>
                <!-- Action buttons for generating speech and downloading the result -->
                <div class="actions">
                    <button id="generateBtn" class="btn-primary">Generate</button>
                    <button id="downloadBtn" class="btn-secondary" disabled>Download</button>
                </div>
                <!-- Toggle for enabling/disabling streaming audio response -->
                <div class="toggle">
                    <input type="checkbox" id="streamToggle" checked>
                    <label for="streamToggle">Real-time Playback</label>
                </div>
                <!-- Audio element for playing back the synthesized speech -->
                <audio id="audioPlayer" class="audio" controls></audio>
            </section>
            <!-- Side panel for selecting voice, format, and advanced DSP options -->
            <aside class="panel panel-side">
                <div class="field">
                    <label for="voiceSelect" class="label">Voice</label>
                    <select id="voiceSelect"></select>
                </div>
                <div class="field">
                    <label for="formatSelect" class="label">Format</label>
                    <select id="formatSelect">
                        <option value="mp3">MP3</option>
                        <option value="opus">Opus (Ogg)</option>
                        <option value="wav">WAV</option>
                        <option value="pcm">Raw PCM</option>
                    </select>
                </div>
                <!-- Slider and number input for adjusting the speed of the synthesized speech -->
                <div class="field">
                    <label class="label">Speed</label>
                    <div class="row">
                        <input type="range" id="speedSlider" min="0.25" max="4" step="0.01" value="0.75">
                        <input type="number" id="speedNum" class="input-num" min="0.25" max="4" step="0.01" value="0.75">
                    </div>
                </div>

                <div class="divider"></div>
                <!-- Collapsible sections for advanced audio effect controls, initially hidden and disabled until a voice is selected -->
                <details class="advanced-group">
                    <summary>Audio Effects</summary>
                    <div class="group-content">
                        <div class="field">
                            <div class="toggle">
                                <input type="checkbox" id="useEffect">
                                <label for="useEffect">Character Effect</label>
                            </div>
                            <select id="effectSelect" disabled></select>
                            
                            <div class="row effect-row">
                                <input type="range" id="effectIntSlider" min="0" max="1" step="0.01" value="1" disabled>
                                <input type="number" id="effectIntNum" class="input-num" min="0" max="1" step="0.01" value="1" disabled>
                            </div>
                        </div>
                        <div class="field">
                            <div class="toggle">
                                <input type="checkbox" id="useEnvironment">
                                <label for="useEnvironment">Acoustic Space</label>
                            </div>
                            <select id="environmentSelect" disabled></select>
                            
                            <div class="row effect-row">
                                <input type="range" id="envIntSlider" min="0" max="1" step="0.01" value="0.5" disabled>
                                <input type="number" id="envIntNum" class="input-num" min="0" max="1" step="0.01" value="0.5" disabled>
                            </div>
                        </div>
                    </div>
                </details>
                <!-- Collapsible section for pitch shifting controls, allowing users to adjust the pitch of the synthesized voice -->
                <details class="advanced-group">
                    <summary>Voice Shift</summary>
                    <div class="group-content">
                        <div class="field">
                            <div class="toggle">
                                <input type="checkbox" id="usePitch">
                                <label for="usePitch">Pitch</label>
                            </div>
                            <div class="row">
                                <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.01" value="1.0" disabled>
                                <input type="number" id="pitchNum" class="input-num" min="0.5" max="2.0" step="0.01" value="1.0" disabled>
                            </div>
                        </div>
                        
                        </div>
                </details>
                <!-- Collapsible section for prosody and rhythm controls, allowing users to adjust expression and rhythm parameters -->
                <details class="advanced-group">
                    <summary>Speech Dynamics</summary>
                    <div class="group-content">
                        <div class="field">
                            <div class="toggle">
                                <input type="checkbox" id="useNoiseScale">
                                <label for="useNoiseScale">Expression</label>
                            </div>
                            <div class="row">
                                <input type="range" id="nsSlider" min="0" max="1.0" step="0.001" value="0.667" disabled>
                                <input type="number" id="nsNum" class="input-num" min="0" max="1.0" step="0.001" value="0.667" disabled>
                            </div>
                        </div>
                        <div class="field">
                            <div class="toggle">
                                <input type="checkbox" id="useNoiseW">
                                <label for="useNoiseW">Rhythm</label>
                            </div>
                            <div class="row">
                                <input type="range" id="nwSlider" min="0" max="1.0" step="0.001" value="0.8" disabled>
                                <input type="number" id="nwNum" class="input-num" min="0" max="1.0" step="0.001" value="0.8" disabled>
                            </div>
                        </div>
                    </div>
                </details>

            </aside>
            <!-- Panel for displaying status logs and messages from the application -->
            <section class="panel panel-log">
                <div id="statusLog" class="log"></div>
            </section>

        </main>
    </div>
    <!-- Main application script that handles UI interactions, API communication, and audio processing -->
    <script src="js/accordion.js"></script>
    <script type="module" src="js/app.js"></script>

</body>
</html>
