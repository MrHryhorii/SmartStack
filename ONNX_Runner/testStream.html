<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Streaming Tester - Retro Edition</title>
    <style>
        /* Base styling: Dark deep blue/black background for eye comfort */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px; 
            background: #101014; 
            color: #d8d8e6; 
        }
        
        /* Main card with subtle neon glow */
        .card { 
            background: #1a1a24; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(0, 243, 255, 0.05); 
            border: 1px solid #2a2a36;
        }
        
        h2 { 
            color: #00f3ff; 
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            margin-top: 0;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 15px; }
        
        label { 
            font-weight: 600; 
            display: block; 
            margin-bottom: 6px; 
            color: #bcaafc; /* Soft purple */
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }
        
        /* Input fields with Cyberpunk aesthetic */
        input[type="text"], input[type="number"], select, textarea, input[type="url"] { 
            width: 100%; 
            padding: 12px; 
            background: #0d0d12;
            color: #00f3ff; /* Neon cyan text */
            border: 1px solid #3a3a4c; 
            border-radius: 6px; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        textarea { resize: vertical; height: 120px; }

        /* Focus states for glow effect without blinding the user */
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 12px rgba(255, 0, 255, 0.2);
            background: #111118;
        }
        
        /* Checkbox styling */
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input { width: auto; transform: scale(1.2); accent-color: #ff00ff; }
        
        /* Neon Button */
        button { 
            background: linear-gradient(135deg, #b100ff, #ff00ff); 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: 100%; 
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
            transition: 0.2s all ease-in-out; 
        }
        button:hover { 
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.6); 
            transform: translateY(-2px);
        }
        button:disabled { 
            background: #333; 
            color: #666;
            box-shadow: none; 
            cursor: not-allowed; 
            transform: translateY(0);
        }
        
        /* Audio player dark mode */
        audio { 
            width: 100%; 
            margin-top: 25px; 
            filter: invert(90%) hue-rotate(180deg); /* CSS trick to make default audio player dark */
            opacity: 0.8;
        }
        
        /* Retro terminal logs */
        .logs { 
            margin-top: 10px; 
            background: #050508; 
            color: #ff0055; /* Synthwave pink/red */
            padding: 15px; 
            border-radius: 6px; 
            height: 150px; 
            overflow-y: auto; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 13px; 
            border: 1px solid #222;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        
        .endpoint-group { 
            background: #14141d; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 25px; 
            border: 1px dashed #00f3ff; 
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🎙️ Voice API Tester</h2>

    <div class="form-group endpoint-group">
        <label for="endpoint">API Endpoint URL:</label>
        <input type="url" id="endpoint" value="http://localhost:5045/v1/audio/speech">
    </div>
    
    <div class="form-group">
        <label for="input">Text to Synthesize:</label>
        <textarea id="input">Nordlys, eller Aurora Borealis, er et fantastisk naturfenomen som ofte kan observeres i Nord-Norge under vintermånedene. Det oppstår når elektrisk ladede partikler fra solen kolliderer med gasser i jordens atmosfære.</textarea>
    </div>

    <div style="display: flex; gap: 15px;">
        <div class="form-group" style="flex: 1;">
            <label for="model">Model:</label>
            <input type="text" id="model" value="tts-1">
        </div>
        <div class="form-group" style="flex: 1;">
            <label for="voice">Voice:</label>
            <input type="text" id="voice" value="female">
        </div>
    </div>

    <div style="display: flex; gap: 15px;">
        <div class="form-group" style="flex: 1;">
            <label for="format">Response Format:</label>
            <select id="format">
                <option value="mp3">MP3</option>
                <option value="opus">Opus (OGG)</option>
                <option value="wav">WAV (No stream)</option>
                <option value="pcm">Raw PCM</option>
            </select>
        </div>
        <div class="form-group" style="flex: 1;">
            <label for="speed">Speed (0.25 - 4.0):</label>
            <input type="number" id="speed" value="1.0" step="0.1" min="0.25" max="4.0">
        </div>
    </div>

    <div style="display: flex; gap: 15px; padding-top: 15px; border-top: 1px solid #2a2a36;">
        <div class="form-group" style="flex: 2;">
            <label for="effect">DSP Effect Engine:</label>
            <select id="effect">
                <option value="None">None (Clean Voice)</option>
                <option value="Telephone">☎️ Telephone (Lo-Fi)</option>
                <option value="Overdrive">🎸 Overdrive (Saturation)</option>
                <option value="Bitcrusher">👾 Bitcrusher (8-Bit/Arcade)</option>
                <option value="RingModulator">🤖 Ring Modulator (Robot)</option>
                <option value="Flanger">🛸 Flanger (Space Sweep)</option>
                <option value="Chorus">👥 Chorus (Multi-Voice)</option>
            </select>
        </div>
        <div class="form-group" style="flex: 1;">
            <label for="effectIntensity">Dry/Wet Mix:</label>
            <input type="number" id="effectIntensity" value="1.0" step="0.1" min="0.0" max="1.0">
        </div>
    </div>

    <div class="form-group checkbox-group">
        <input type="checkbox" id="stream" checked>
        <label for="stream" style="margin: 0; cursor: pointer; color: #d8d8e6;">Enable Chunked Streaming</label>
    </div>

    <button id="generateBtn" onclick="generateAudio()">INITIATE SEQUENCE</button>

    <audio id="player" controls></audio>

    <label style="margin-top: 25px; color: #bcaafc;">Terminal Output:</label>
    <div class="logs" id="logs">SYSTEM READY...<br></div>
</div>

<script>
    const logBox = document.getElementById('logs');
    const player = document.getElementById('player');
    const btn = document.getElementById('generateBtn');

    function log(message) {
        const time = new Date().toISOString().split('T')[1].substring(0, 8);
        logBox.innerHTML += `[${time}] ${message}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function generateAudio() {
        logBox.innerHTML = '';
        player.removeAttribute('src');
        btn.disabled = true;
        btn.innerText = "PROCESSING...";

        const targetUrl = document.getElementById('endpoint').value.trim();
        
        const requestData = {
            model: document.getElementById('model').value,
            input: document.getElementById('input').value,
            voice: document.getElementById('voice').value,
            response_format: document.getElementById('format').value,
            speed: parseFloat(document.getElementById('speed').value),
            stream: document.getElementById('stream').checked,
            Effect: document.getElementById('effect').value,
            EffectIntensity: parseFloat(document.getElementById('effectIntensity').value)
        };

        log(`Uplink established. Sending payload to ${targetUrl}...`);
        if (requestData.Effect !== "None") {
            log(`DSP Engaged: ${requestData.Effect} | Wet mix: ${requestData.EffectIntensity * 100}%`);
        }

        try {
            const response = await fetch(targetUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `HTTP Code ${response.status}`);
            }

            const mimeType = response.headers.get('Content-Type') || 'audio/mpeg';
            const isStreamingEnabled = requestData.stream;
            
            const supportsMSE = window.MediaSource && MediaSource.isTypeSupported(mimeType);

            log(`Data stream incoming. Format: ${mimeType}`);

            if (isStreamingEnabled && supportsMSE) {
                await handleStreamedResponse(response.body.getReader(), mimeType);
            } else {
                if (isStreamingEnabled) log("⚠️ Native MSE unavailable. Buffering entire payload...");
                await handleBufferedResponse(response.blob(), mimeType);
            }

        } catch (error) {
            log(`❌ CRITICAL ERROR: ${error.message}`);
        } finally {
            btn.disabled = false;
            btn.innerText = "INITIATE SEQUENCE";
        }
    }

    async function handleStreamedResponse(reader, mimeType) {
        const mediaSource = new MediaSource();
        player.src = URL.createObjectURL(mediaSource);

        await new Promise(resolve => mediaSource.addEventListener('sourceopen', resolve, { once: true }));
        
        const sourceBuffer = mediaSource.addSourceBuffer(mimeType);
        let totalBytes = 0;
        let isFirstChunk = true;

        const appendChunk = async (chunk) => {
            return new Promise((resolve) => {
                sourceBuffer.addEventListener('updateend', resolve, { once: true });
                sourceBuffer.appendBuffer(chunk);
            });
        };

        while (true) {
            const { done, value } = await reader.read();
            
            if (done) {
                if (mediaSource.readyState === 'open') {
                    mediaSource.endOfStream();
                }
                log("✅ Transmission complete.");
                break;
            }

            totalBytes += value.length;
            log(`⬇️ Chunk decoded: ${value.length} bytes (Total: ${(totalBytes / 1024).toFixed(2)} KB)`);

            await appendChunk(value);

            if (isFirstChunk) {
                player.play().catch(e => log(`⚠️ Autoplay blocked: ${e.message}`));
                log("🎵 Playback engaged.");
                isFirstChunk = false;
            }
        }
    }

    async function handleBufferedResponse(blobPromise, mimeType) {
        log("⏳ Buffering...");
        const blob = await blobPromise;
        const audioBlob = new Blob([blob], { type: mimeType });
        
        log(`✅ File reconstructed. Size: ${(audioBlob.size / 1024).toFixed(2)} KB`);
        
        player.src = URL.createObjectURL(audioBlob);
        player.play().catch(e => log(`⚠️ Autoplay blocked: ${e.message}`));
        log("🎵 Playback engaged.");
    }
</script>

</body>
</html>
